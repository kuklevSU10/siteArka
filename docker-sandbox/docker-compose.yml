services:
  studio-bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: openclaw-studio-bot
    restart: unless-stopped

    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - NODE_OPTIONS=--max-old-space-size=1536
      - NODE_LLAMA_CPP_SKIP_DOWNLOAD=true

    volumes:
      - type: bind
        source: ../
        target: /workspace
        read_only: false
      - type: bind
        source: ./openclaw-config
        target: /root/.openclaw
        read_only: false

    networks:
      - studio-isolated

    deploy:
      resources:
        limits:
          memory: 2g
          cpus: "1.0"

networks:
  studio-isolated:
    driver: bridge
    internal: false
